<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Job Assistant — Automation Flow</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <header>
    <h1>AI JOB ASSISTANT</h1>
    <p>AI-powered job application automation workflow</p>
  </header>
  <div id="hint">Drag cards to rearrange · Drag background to pan · Scroll or use buttons to zoom</div>
  <div id="viewport">
    <div id="canvas">
      <svg id="lines"><defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
        </marker>
      </defs></svg>
      <!-- nodes injected by JS -->
    </div>
  </div>
  <div id="controls">
    <button id="zin">+</button>
    <div id="zoomlvl">100%</div>
    <button id="zout">−</button>
    <button id="zreset" title="Reset view" style="font-size:13px;">⟳</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
