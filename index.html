<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Job Assistant — Automation Flow</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<button id="propsToggleBtn" type="button">Properties</button>

<div id="propertiesPanel">
  <div class="panel-header">
    <div class="panel-header-top">
      <div class="panel-title-group">
        <div class="panel-icon" id="panelIcon"></div>
        <div class="panel-title-text">
          <div class="panel-eyebrow">PROPERTIES PANEL</div>
          <div class="panel-name" id="panelName">No card selected</div>
        </div>
      </div>
      <button id="panelCloseBtn" class="panel-close" title="Close">&times;</button>
    </div>
    <div class="panel-desc" id="panelDesc">Click a workflow card to view and edit its settings.</div>
  </div>
  <div class="panel-body" id="panelBody">
    <div class="panel-empty">
      <div class="panel-empty-icon">🗂️</div>
      <p>Select a card on the canvas to configure it here.</p>
    </div>
  </div>
  <div class="panel-footer" id="panelFooter" style="display:none;">
    <button id="panelDelete" class="btn-panel btn-delete">Delete</button>
    <button id="panelSave" class="btn-panel btn-save">Save Changes</button>
  </div>
</div>
<div id="panelBackdrop"></div>

<div id="app">
  <header>
    <h1>AI JOB ASSISTANT</h1>
    <p>AI-powered job application automation workflow</p>
  </header>
  <div id="viewport">
    <div id="canvas">
      <svg id="lines"><defs>
        <marker id="arrow-grey" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
        </marker>
        <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#16a34a"/>
        </marker>
        <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#dc2626"/>
        </marker>
        <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#ea580c"/>
        </marker>
        <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#2563eb"/>
        </marker>
      </defs></svg>
      <!-- nodes injected by JS -->
    </div>
  </div>
  <div id="controls">
    <button id="dragmode" title="Toggle drag mode">✋</button>
    <div style="height:6px;"></div>
    <button id="scrollzoom" title="Toggle scroll-wheel zoom">🔍</button>
    <div style="height:6px;"></div>
    <button id="zin">+</button>
    <div id="zoomlvl">100%</div>
    <button id="zout">−</button>
    <button id="zreset" title="Reset view" style="font-size:13px;">⟳</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
